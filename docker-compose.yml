version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ai_docgen_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_password}
      POSTGRES_DB: ${POSTGRES_DB:-ai_docgen}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_docgen_backend
    restart: always
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-ai_user}:${POSTGRES_PASSWORD:-ai_password}@db:5432/${POSTGRES_DB:-ai_docgen}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app

volumes:
  pgdata:
